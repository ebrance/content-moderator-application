server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint for ALB target group
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Reverse proxy — forward /api/* requests to the internal ALB.
    # This avoids mixed-content errors: the browser calls HTTPS on the
    # same origin, and Nginx forwards to the internal HTTP ALB privately.
    location /api/ {
        proxy_pass http://INTERNAL_ALB_DNS/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # React app — serve index.html for all other routes (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}